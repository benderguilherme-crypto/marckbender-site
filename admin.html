<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Blog — Marck Bender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --marine: #0a1628; --marine-soft: #1a2942;
  --teal: #2563b8; --teal-soft: #1a4d8c; --text-muted: #5a6478; --text-light: #8a92a3;
  --border: rgba(10,22,40,0.08); --border-strong: rgba(10,22,40,0.12);
  --steel-gradient: linear-gradient(135deg, #a8d4f5 0%, #5a9fdb 25%, #2563b8 60%, #1a4d8c 100%);
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--marine); font-family: var(--font-body); font-size: 16px; line-height: 1.6; }

nav { position: sticky; top: 0; z-index: 100; background: rgba(245,245,247,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 6%; }
.nav-logo { font-weight: 800; font-size: 16px; letter-spacing: -0.03em; color: var(--marine); text-decoration: none; }
.nav-logo span { color: var(--teal); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-status { font-size: 13px; color: var(--text-muted); }
.nav-logout { font-size: 13px; color: var(--teal); text-decoration: none; font-weight: 600; cursor: pointer; }

.container { max-width: 1100px; margin: 0 auto; padding: 40px 6% 80px; }

/* Login */
.login-wrap { max-width: 400px; margin: 120px auto; text-align: center; }
.login-wrap h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.03em; }
.login-wrap p { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
.login-field { width: 100%; padding: 14px 20px; border: 2px solid var(--border-strong); border-radius: 100px; font-size: 15px; font-family: var(--font-body); outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
.login-field:focus { border-color: var(--teal); }
.login-btn { width: 100%; padding: 14px; background: var(--marine); color: white; font-weight: 700; border: none; border-radius: 100px; font-size: 15px; cursor: pointer; font-family: var(--font-body); transition: all 0.2s; }
.login-btn:hover { background: var(--marine-soft); }
.login-error { color: #dc2626; font-size: 14px; margin-top: 12px; display: none; }

/* Editor */
.editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
.editor-header h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; }
.editor-actions { display: flex; gap: 12px; }
.btn { padding: 12px 24px; border-radius: 100px; border: none; font-size: 14px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: all 0.2s; }
.btn-secondary { background: white; color: var(--marine); border: 2px solid var(--border-strong); }
.btn-secondary:hover { border-color: var(--teal); }
.btn-primary { background: var(--steel-gradient); color: white; box-shadow: inset 0 -3px 6px rgba(0,0,0,0.35), inset 0 3px 4px rgba(255,255,255,0.4), 0 4px 16px rgba(37,99,184,0.4); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: inset 0 -3px 6px rgba(0,0,0,0.35), inset 0 3px 4px rgba(255,255,255,0.4), 0 8px 24px rgba(37,99,184,0.5); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
.form-input { padding: 12px 16px; border: 2px solid var(--border-strong); border-radius: 12px; font-size: 15px; font-family: var(--font-body); outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: var(--teal); }

.editor-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: 32px; border: 2px solid var(--border-strong); border-radius: 16px; overflow: hidden; min-height: 500px; }
.editor-pane { display: flex; flex-direction: column; }
.editor-pane-header { padding: 12px 16px; background: var(--marine); color: white; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.editor-pane:nth-child(1) { border-right: 1px solid var(--border); }
.editor-textarea { flex: 1; padding: 20px; border: none; font-size: 15px; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; line-height: 1.7; resize: none; outline: none; color: var(--marine); background: white; }
.preview { flex: 1; padding: 20px; overflow-y: auto; background: white; }
.preview h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 16px; }
.preview h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--marine); margin: 32px 0 12px; }
.preview h3 { font-size: 18px; font-weight: 700; margin: 24px 0 8px; }
.preview p { font-size: 16px; color: var(--text-muted); line-height: 1.8; margin-bottom: 16px; }
.preview strong { color: var(--marine); font-weight: 600; }
.preview em { font-family: var(--font-display); font-style: italic; }
.preview ul, .preview ol { margin-bottom: 16px; padding-left: 20px; }
.preview li { font-size: 15px; color: var(--text-muted); line-height: 1.7; margin-bottom: 6px; }
.preview blockquote { border-left: 3px solid var(--teal); padding: 12px 20px; margin: 24px 0; background: rgba(37,99,184,0.04); border-radius: 0 8px 8px 0; }
.preview blockquote p { margin-bottom: 0; font-style: italic; }
.preview code { background: rgba(10,22,40,0.06); padding: 2px 6px; border-radius: 4px; font-size: 14px; }

/* Articles list */
.articles-list { margin-top: 40px; }
.articles-list h3 { font-size: 18px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
.article-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: white; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); transition: all 0.2s; }
.article-row:hover { border-color: var(--teal); box-shadow: 0 4px 16px -8px rgba(37,99,184,0.15); }
.article-row-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.article-row-info span { font-size: 13px; color: var(--text-light); }
.article-row-actions { display: flex; gap: 8px; }
.btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 100px; border: none; font-weight: 600; cursor: pointer; font-family: var(--font-body); transition: all 0.2s; }
.btn-edit { background: rgba(37,99,184,0.08); color: var(--teal); }
.btn-edit:hover { background: rgba(37,99,184,0.15); }
.btn-delete { background: rgba(220,38,38,0.08); color: #dc2626; }
.btn-delete:hover { background: rgba(220,38,38,0.15); }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 9999; transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: #0a1628; color: white; }
.toast.error { background: #dc2626; color: white; }

/* Responsive */
@media (max-width: 700px) {
  .form-grid { grid-template-columns: 1fr; }
  .editor-body { grid-template-columns: 1fr; min-height: auto; }
  .editor-pane:nth-child(1) { border-right: none; border-bottom: 1px solid var(--border); }
  .editor-textarea { min-height: 300px; }
  .preview { min-height: 300px; }
  .editor-header { flex-direction: column; gap: 16px; align-items: flex-start; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Nav -->
<nav>
  <a href="/" class="nav-logo">Marck <span>Bender</span> · Admin</a>
  <div class="nav-right">
    <span class="nav-status" id="nav-status"></span>
    <a class="nav-logout" id="nav-logout">Deconnexion</a>
  </div>
</nav>

<!-- Login -->
<div class="login-wrap" id="login-section">
  <h1>Admin Blog</h1>
  <p>Entre le mot de passe pour acceder a l'editeur.</p>
  <input type="password" class="login-field" id="login-pass" placeholder="Mot de passe" autofocus>
  <button class="login-btn" id="login-btn">Connexion</button>
  <div class="login-error" id="login-error">Mot de passe incorrect</div>
</div>

<!-- Editor -->
<div class="container hidden" id="editor-section">
  <div class="editor-header">
    <h2 id="editor-title">Nouvel article</h2>
    <div class="editor-actions">
      <button class="btn btn-secondary" id="btn-new">Nouveau</button>
      <button class="btn btn-primary" id="btn-publish">Publier</button>
    </div>
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">Titre</label>
      <input class="form-input" id="field-title" placeholder="Titre de l'article">
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="field-date" type="date">
    </div>
    <div class="form-group full">
      <label class="form-label">Extrait</label>
      <input class="form-input" id="field-excerpt" placeholder="Resume en une phrase">
    </div>
  </div>

  <div class="editor-body">
    <div class="editor-pane">
      <div class="editor-pane-header">Markdown</div>
      <textarea class="editor-textarea" id="field-content" placeholder="Ecris ton article en markdown ici...&#10;&#10;## Mon sous-titre&#10;&#10;Mon paragraphe...&#10;&#10;**gras** *italique*"></textarea>
    </div>
    <div class="editor-pane">
      <div class="editor-pane-header">Apercu</div>
      <div class="preview" id="preview"></div>
    </div>
  </div>

  <div class="articles-list">
    <h3>Articles publies</h3>
    <div id="articles-list"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const ADMIN_PASS = 'Marck2026!';

const loginSection = document.getElementById('login-section');
const editorSection = document.getElementById('editor-section');
const loginBtn = document.getElementById('login-btn');
const loginPass = document.getElementById('login-pass');
const loginError = document.getElementById('login-error');
const navStatus = document.getElementById('nav-status');
const navLogout = document.getElementById('nav-logout');
const fieldTitle = document.getElementById('field-title');
const fieldDate = document.getElementById('field-date');
const fieldExcerpt = document.getElementById('field-excerpt');
const fieldContent = document.getElementById('field-content');
const previewEl = document.getElementById('preview');
const btnPublish = document.getElementById('btn-publish');
const btnNew = document.getElementById('btn-new');
const editorTitle = document.getElementById('editor-title');
const toastEl = document.getElementById('toast');
const articlesListEl = document.getElementById('articles-list');

// --- Auth ---
function checkAuth() {
  if (sessionStorage.getItem('mb_admin') === '1') { showEditor(); return; }
  showLogin();
}
function showLogin() { loginSection.classList.remove('hidden'); editorSection.classList.add('hidden'); navStatus.textContent = ''; }
function showEditor() { loginSection.classList.add('hidden'); editorSection.classList.remove('hidden'); navStatus.textContent = 'Connecte'; loadArticles(); }

loginBtn.addEventListener('click', doLogin);
loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
navLogout.addEventListener('click', () => { sessionStorage.removeItem('mb_admin'); showLogin(); });

function doLogin() {
  if (loginPass.value === ADMIN_PASS) { sessionStorage.setItem('mb_admin', '1'); showEditor(); }
  else { loginError.style.display = 'block'; loginPass.value = ''; loginPass.focus(); }
}

// --- Sanitize markdown output for safe rendering ---
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function mdToHtml(md) {
  let html = escapeHtml(md);
  html = html
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:12px;margin:16px 0;">')
    .replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<)/, '<p>')
    .replace(/(?!>)$/, '</p>');
  return html;
}

fieldContent.addEventListener('input', () => {
  previewEl.innerHTML = mdToHtml(fieldContent.value);
});

// --- Slug ---
function slugify(text) {
  return text.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
}

// --- Date default ---
fieldDate.value = new Date().toISOString().split('T')[0];

// --- Publish ---
btnPublish.addEventListener('click', async () => {
  const title = fieldTitle.value.trim();
  const date = fieldDate.value;
  const excerpt = fieldExcerpt.value.trim();
  const content = fieldContent.value.trim();

  if (!title || !content) { showToast('Remplis le titre et le contenu', 'error'); return; }

  const slug = slugify(title);
  const md = `---\ntitle: "${title}"\ndate: ${date}\nslug: ${slug}\nexcerpt: "${excerpt}"\nimage: ""\n---\n\n${content}`;

  btnPublish.disabled = true;
  btnPublish.textContent = 'Publication...';

  try {
    const res = await fetch('/api/publish-article', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: `${date}-${slug}.md`, content: md })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('Article publie ! Redeploiement en cours...', 'success');
      resetForm();
      loadArticles();
    } else {
      showToast(data.error || 'Erreur', 'error');
    }
  } catch {
    showToast('Erreur de connexion', 'error');
  }
  btnPublish.disabled = false;
  btnPublish.textContent = 'Publier';
});

// --- Load articles ---
async function loadArticles() {
  try {
    const res = await fetch('/api/list-articles');
    const data = await res.json();
    if (data.articles) {
      articlesListEl.textContent = '';
      data.articles.forEach(a => {
        const row = document.createElement('div');
        row.className = 'article-row';

        const info = document.createElement('div');
        info.className = 'article-row-info';
        const h4 = document.createElement('h4');
        h4.textContent = a.title;
        const span = document.createElement('span');
        span.textContent = a.date + ' · /blog/' + a.slug;
        info.appendChild(h4);
        info.appendChild(span);

        const actions = document.createElement('div');
        actions.className = 'article-row-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'btn-sm btn-edit';
        editBtn.textContent = 'Modifier';
        editBtn.addEventListener('click', () => editArticle(a.filename));

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-sm btn-delete';
        delBtn.textContent = 'Supprimer';
        delBtn.addEventListener('click', () => deleteArticle(a.filename));

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        row.appendChild(info);
        row.appendChild(actions);
        articlesListEl.appendChild(row);
      });
    }
  } catch {}
}

async function editArticle(filename) {
  try {
    const res = await fetch(`/api/get-article?file=${encodeURIComponent(filename)}`);
    const data = await res.json();
    if (data.raw) {
      const { meta, body } = parseFrontmatter(data.raw);
      fieldTitle.value = meta.title || '';
      fieldDate.value = meta.date || '';
      fieldExcerpt.value = meta.excerpt || '';
      fieldContent.value = body || '';
      previewEl.innerHTML = mdToHtml(body || '');
      editorTitle.textContent = 'Modifier : ' + (meta.title || filename);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  } catch { showToast('Erreur chargement article', 'error'); }
}

async function deleteArticle(filename) {
  if (!confirm('Supprimer cet article ?')) return;
  try {
    const res = await fetch('/api/delete-article', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename })
    });
    if (res.ok) { showToast('Article supprime', 'success'); loadArticles(); }
    else { const data = await res.json(); showToast(data.error || 'Erreur', 'error'); }
  } catch { showToast('Erreur', 'error'); }
}

function parseFrontmatter(content) {
  const match = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: content };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const [key, ...rest] = line.split(':');
    if (key && rest.length) meta[key.trim()] = rest.join(':').trim().replace(/^"|"$/g, '');
  });
  return { meta, body: match[2] };
}

function resetForm() {
  fieldTitle.value = '';
  fieldDate.value = new Date().toISOString().split('T')[0];
  fieldExcerpt.value = '';
  fieldContent.value = '';
  previewEl.textContent = '';
  editorTitle.textContent = 'Nouvel article';
}

btnNew.addEventListener('click', resetForm);

function showToast(msg, type) {
  toastEl.textContent = msg;
  toastEl.className = 'toast ' + type;
  setTimeout(() => toastEl.classList.add('show'), 10);
  setTimeout(() => toastEl.classList.remove('show'), 3500);
}

checkAuth();
</script>
</body>
</html>
